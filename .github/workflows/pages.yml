# 工作流名称，仅作标识，无需修改
name: Deploy to GitHub Pages

# 触发条件：当 main 分支有代码推送时，自动执行这个工作流
on:
  push:
    branches: [ main ]

# 定义要执行的任务
jobs:
  deploy:
    # 使用 GitHub 最新的 Ubuntu 服务器运行任务
    runs-on: ubuntu-latest
    # 任务步骤
    steps:
      # 第一步：拉取仓库代码到服务器
      - uses: actions/checkout@v3

      # 第二步：设置 Node.js 环境（Vite 适配 20 版本，无需修改）
      - name: 设置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm' # 缓存 npm 依赖，加速下次构建

      # 第三步：安装项目依赖（替换 npm ci 为 npm install，解决无 lock 文件报错）
      - name: 安装依赖
        run: npm install

      # 第四步：执行 Vite 构建命令（生成 dist 文件夹）
      - name: 构建项目
        run: npm run build

      # 第五步：将构建后的 dist 文件夹部署到 GitHub Pages
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # GitHub 自动生成的令牌，无需手动配置
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Vite 项目构建输出目录，固定为 ./dist，无需修改
          publish_dir: ./dist
